# asset-search-v2 master config
#
# Secrets (API keys, DB URLs) go in .env — never here.
# Only override values you want to change — everything has sensible defaults.
# Env vars override any value below.
#
# Resolution order per field: env var > this file > hardcoded default.
#
# For the full list of keys per section, see the matching sub-module config:
#   [profile]   → corp_profile.enrich.EnrichConfig
#   [scraper]   → web_scraper.config.ScraperConfig
#   [extractor] → doc_extractor.config.ExtractorConfig
#   [rag]       → rag.config.RAGConfig

# ── Models ────────────────────────────────────────────────────────────────────
# Any litellm-supported model string.
[models]
profile  = "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
discover = "bedrock/us.anthropic.claude-opus-4-6-v1"
extract  = "bedrock/us.anthropic.claude-opus-4-6-v1"
merge    = "openai/gpt-5-mini"
qa       = "bedrock/us.anthropic.claude-opus-4-6-v1"

# ── corp-profile ──────────────────────────────────────────────────────────────
[profile]
llm = false         # run LLM enrichment (clean, refine estimates)
web_search = false   # web search during enrichment (requires llm = true)

# ── web-scraper ───────────────────────────────────────────────────────────────
# [scraper]
# default_timeout_ms = 30_000
# default_proxy = false

# ── doc-extractor ─────────────────────────────────────────────────────────────
# Increase max_batch_tokens for models with larger context (e.g. 300K+ for GPT-5.2).
[extractor]
max_batch_tokens = 120_000

# ── rag ───────────────────────────────────────────────────────────────────────
# [rag]
# All defaults are fine for text-embedding-3-small + rerank-v3.5

# ── AWS ───────────────────────────────────────────────────────────────────────
[aws]
region = "us-east-2"

# ── Search ────────────────────────────────────────────────────────────────────
[search]
provider = "exa"  # exa | brave | tavily | openai

# ── Pipeline caps ─────────────────────────────────────────────────────────────
[pipeline]
max_scrape_concurrency = 20
page_stale_days = 30
max_discover_tool_calls = 200
max_discover_minutes = 15
max_qa_iterations = 2
max_urls_per_run = 5000
